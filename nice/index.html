<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEBLOAT - Supplement Ad</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --matte-black: #121212;
      --deep-black: #0A0A0A;
      --charcoal: #1A1A1A;
      --metallic-silver: #C0C0C0;
      --light-silver: #E8E8E8;
      --bold-red: #E31C25;
      --dark-red: #B01820;
      --industrial-gray: #2D2D2D;
      --accent-green: #4CAF50;
    }

    body {
      font-family: 'Oswald', sans-serif;
      background: var(--deep-black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .ad-container {
      width: 100%;
      max-width: 1080px;
      aspect-ratio: 1 / 1;
      background: linear-gradient(
        135deg,
        var(--deep-black) 0%,
        var(--charcoal) 30%,
        var(--industrial-gray) 60%,
        var(--charcoal) 100%
      );
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 
        0 0 60px rgba(227, 28, 37, 0.3),
        0 0 120px rgba(0, 0, 0, 0.8);
    }

    .gym-overlay {
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 100px,
          rgba(192, 192, 192, 0.03) 100px,
          rgba(192, 192, 192, 0.03) 101px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 100px,
          rgba(192, 192, 192, 0.03) 100px,
          rgba(192, 192, 192, 0.03) 101px
        );
      pointer-events: none;
    }

    .spotlight {
      position: absolute;
      width: 150%;
      height: 150%;
      top: -25%;
      left: -25%;
      background: radial-gradient(
        ellipse at 50% 30%,
        rgba(255, 255, 255, 0.08) 0%,
        rgba(255, 255, 255, 0.03) 30%,
        transparent 60%
      );
      pointer-events: none;
    }

    .red-glow {
      position: absolute;
      bottom: -20%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(
        ellipse at center,
        rgba(227, 28, 37, 0.15) 0%,
        transparent 70%
      );
      pointer-events: none;
    }

    .red-glow-top {
      position: absolute;
      top: -30%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(
        ellipse at center,
        rgba(227, 28, 37, 0.1) 0%,
        transparent 70%
      );
      pointer-events: none;
    }

    .gym-silhouette {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
      opacity: 0.15;
      background: linear-gradient(to top, var(--deep-black), transparent);
    }

    .gym-silhouette::before {
      content: '';
      position: absolute;
      bottom: 10%;
      left: 5%;
      width: 120px;
      height: 200px;
      background: var(--matte-black);
      clip-path: polygon(
        10% 100%, 10% 80%, 0% 80%, 0% 70%, 20% 70%, 20% 30%, 
        30% 30%, 30% 0%, 70% 0%, 70% 30%, 80% 30%, 80% 70%, 
        100% 70%, 100% 80%, 90% 80%, 90% 100%
      );
    }

    .gym-silhouette::after {
      content: '';
      position: absolute;
      bottom: 15%;
      right: 8%;
      width: 80px;
      height: 150px;
      background: var(--matte-black);
      clip-path: polygon(
        0% 100%, 0% 20%, 40% 20%, 40% 0%, 60% 0%, 60% 20%, 
        100% 20%, 100% 100%, 70% 100%, 70% 40%, 30% 40%, 30% 100%
      );
    }

    .energy-ring {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border: 3px solid var(--bold-red);
      border-radius: 50%;
      opacity: 0.6;
      box-shadow: 
        0 0 30px var(--bold-red),
        0 0 60px rgba(227, 28, 37, 0.5),
        inset 0 0 30px rgba(227, 28, 37, 0.3);
      animation: pulse 3s ease-in-out infinite;
    }

    .energy-ring::before {
      content: '';
      position: absolute;
      inset: -20px;
      border: 1px solid rgba(227, 28, 37, 0.3);
      border-radius: 50%;
    }

    .energy-ring::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(227, 28, 37, 0.4);
      border-radius: 50%;
    }

    @keyframes pulse {
      0%, 100% { 
        opacity: 0.6; 
        transform: translateX(-50%) scale(1);
      }
      50% { 
        opacity: 0.8; 
        transform: translateX(-50%) scale(1.02);
      }
    }

    .model-area {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 450px;
      height: 85%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .model-silhouette {
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, var(--charcoal) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .model-placeholder {
      width: 320px;
      height: 580px;
      background: linear-gradient(180deg, rgba(45, 45, 45, 0.8) 0%, rgba(26, 26, 26, 0.9) 100%);
      border: 2px dashed rgba(192, 192, 192, 0.3);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      position: relative;
      overflow: hidden;
    }

    .model-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(227, 28, 37, 0.1) 50%, transparent 60%);
    }

    .model-icon {
      width: 80px;
      height: 80px;
      border: 3px solid var(--metallic-silver);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .model-icon svg {
      width: 40px;
      height: 40px;
      fill: var(--metallic-silver);
    }

    .model-text {
      color: var(--metallic-silver);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      padding: 0 20px;
    }

    .product-main {
      position: absolute;
      bottom: 8%;
      right: 12%;
      width: 200px;
      height: 220px;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 50%, #e0e0e0 100%);
      border-radius: 20px 20px 15px 15px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.8),
        0 0 40px rgba(227, 28, 37, 0.3),
        inset 0 2px 10px rgba(255, 255, 255, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      transform: rotate(-5deg);
      z-index: 10;
    }

    .product-main::before {
      content: '';
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 25px;
      background: linear-gradient(to bottom, #f0f0f0, #d0d0d0);
      border-radius: 10px 10px 0 0;
    }

    .product-label {
      text-align: center;
    }

    .product-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--matte-black);
      letter-spacing: 3px;
      line-height: 1;
    }

    .product-tagline {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      color: var(--accent-green);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .product-flavor {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      color: var(--industrial-gray);
      margin-top: 8px;
      padding: 3px 10px;
      border: 1px solid var(--industrial-gray);
      border-radius: 3px;
    }

    .green-swoosh {
      position: absolute;
      top: 30%;
      right: 10px;
      width: 40px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent-green) 0%, #2E7D32 100%);
      clip-path: polygon(0% 0%, 100% 20%, 80% 100%, 0% 80%);
      opacity: 0.8;
    }

    .product-floating {
      position: absolute;
      top: 15%;
      left: 8%;
      width: 140px;
      height: 160px;
      background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
      border-radius: 15px 15px 10px 10px;
      box-shadow: 
        0 15px 40px rgba(0, 0, 0, 0.6),
        0 0 30px rgba(227, 28, 37, 0.2);
      transform: rotate(15deg);
      opacity: 0.9;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      animation: float 4s ease-in-out infinite;
    }

    .product-floating::before {
      content: '';
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 18px;
      background: #e0e0e0;
      border-radius: 8px 8px 0 0;
    }

    .product-floating .product-brand {
      font-size: 22px;
    }

    @keyframes float {
      0%, 100% { transform: rotate(15deg) translateY(0); }
      50% { transform: rotate(15deg) translateY(-15px); }
    }

    .motion-bottle {
      position: absolute;
      width: 60px;
      height: 70px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
      border-radius: 10px;
      filter: blur(3px);
    }

    .motion-bottle-1 {
      top: 25%;
      right: 25%;
      transform: rotate(-20deg);
    }

    .motion-bottle-2 {
      top: 40%;
      left: 15%;
      transform: rotate(25deg);
      opacity: 0.5;
    }

    .headline {
      position: absolute;
      top: 5%;
      right: 5%;
      text-align: right;
      max-width: 45%;
      z-index: 20;
    }

    .headline-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(28px, 5vw, 52px);
      color: var(--light-silver);
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 
        2px 2px 4px rgba(0, 0, 0, 0.8),
        0 0 30px rgba(227, 28, 37, 0.5);
    }

    .headline-main .highlight {
      color: var(--bold-red);
      text-shadow: 
        0 0 20px rgba(227, 28, 37, 0.8),
        0 0 40px rgba(227, 28, 37, 0.4);
    }

    .headline-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(12px, 1.8vw, 16px);
      color: var(--metallic-silver);
      margin-top: 15px;
      font-weight: 500;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    .badges {
      position: absolute;
      bottom: 18%;
      left: 5%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 15;
    }

    .badge {
      background: rgba(18, 18, 18, 0.9);
      border: 1px solid var(--metallic-silver);
      padding: 8px 15px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-icon {
      width: 20px;
      height: 20px;
      background: var(--bold-red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge-icon svg {
      width: 12px;
      height: 12px;
      fill: white;
    }

    .badge-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      color: var(--light-silver);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cta-container {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
    }

    .cta-button {
      background: linear-gradient(135deg, var(--bold-red) 0%, var(--dark-red) 100%);
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 2.5vw, 24px);
      padding: 15px 50px;
      border: none;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 
        0 10px 30px rgba(227, 28, 37, 0.5),
        0 0 20px rgba(227, 28, 37, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }

    .logo {
      position: absolute;
      top: 5%;
      left: 5%;
      z-index: 20;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--light-silver);
      letter-spacing: 4px;
    }

    .logo-sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      color: var(--accent-green);
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 700;
    }

    .corner-accent {
      position: absolute;
      width: 150px;
      height: 150px;
      border: 2px solid rgba(227, 28, 37, 0.3);
      pointer-events: none;
    }

    .corner-accent.top-left {
      top: 20px;
      left: 20px;
      border-right: none;
      border-bottom: none;
    }

    .corner-accent.bottom-right {
      bottom: 20px;
      right: 20px;
      border-left: none;
      border-top: none;
    }

    .metal-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--metallic-silver), transparent);
      opacity: 0.3;
    }

    .metal-line-1 {
      width: 200px;
      top: 30%;
      left: 0;
    }

    .metal-line-2 {
      width: 150px;
      bottom: 35%;
      right: 0;
    }
  </style>
</head>
<body>
  <div class="ad-container">
    <!-- Background effects -->
    <div class="gym-overlay"></div>
    <div class="spotlight"></div>
    <div class="red-glow"></div>
    <div class="red-glow-top"></div>
    <div class="gym-silhouette"></div>
    
    <!-- Energy ring -->
    <div class="energy-ring"></div>
    
    <!-- Decorative elements -->
    <div class="corner-accent top-left"></div>
    <div class="corner-accent bottom-right"></div>
    <div class="metal-line metal-line-1"></div>
    <div class="metal-line metal-line-2"></div>
    
    <!-- Motion blur bottles -->
    <div class="motion-bottle motion-bottle-1"></div>
    <div class="motion-bottle motion-bottle-2"></div>
    
    <!-- Logo -->
    <div class="logo">
      <div class="logo-text">NOVAIR</div>
      <div class="logo-sub">Health</div>
    </div>
    
    <!-- Headline -->
    <div class="headline">
      <div class="headline-main">
        UNVEIL YOUR<br>
        <span class="highlight">CONFIDENCE</span><br>
        DEBLOAT YOUR FACE<br>
        IMPROVE YOUR <span class="highlight">LIFE</span>
      </div>
      <div class="headline-sub">
        Premium vitamins & minerals for<br>
        facial definition and endurance
      </div>
    </div>
    
    <!-- Model placeholder -->
    <div class="model-area">
      <div class="model-silhouette">
        <div class="model-placeholder">
          <div class="model-icon">
            <svg viewBox="0 0 24 24">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
          <div class="model-text">
            Model Image<br>Placement Area
          </div>
        </div>
      </div>
    </div>
    
    <!-- Floating product -->
    <div class="product-floating">
      <div class="product-label">
        <div class="product-brand">DEBLOAT</div>
      </div>
    </div>
    
    <!-- Main product -->
    <div class="product-main">
      <div class="green-swoosh"></div>
      <div class="product-label">
        <div class="product-brand">DEBLOAT</div>
        <div class="product-tagline">Bloat Control • Powered by Digeses®</div>
        <div class="product-flavor">Peach Mango</div>
      </div>
    </div>
    
    <!-- Badges -->
    <div class="badges">
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <span class="badge-text">Reduces Water Retention</span>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <span class="badge-text">Supports Detox Organs</span>
      </div>
      <div class="badge">
        <div class="badge-icon">
          <svg viewBox="0 0 24 24">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <span class="badge-text">Natural Formula</span>
      </div>
    </div>
    
    <!-- CTA -->
    <div class="cta-container">
      <button class="cta-button">Get Yours & See Results!</button>
    </div>
  </div>
</body>
</html>
